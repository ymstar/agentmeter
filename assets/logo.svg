<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bc8cff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#bc8cff;stop-opacity:0.9" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="barGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="#0f172a"/>

  <!--
    Layout: bars icon + gap + title + subtitle, all centered as a group.
    Bars: x=0..80 (4 bars, 14px wide, 8px gap each = 4*14 + 3*8 = 80)
    Gap: 20px
    Title "AgentMeter" at 60px bold: ~420px wide
    Total group width: 80 + 20 + 420 = 520
    Group starts at: (800 - 520) / 2 = 140
    Bars at x=140..220, title center at 140+80+20+210 = 450
  -->
  <g>
    <!-- Bar chart icon -->
    <rect x="140" y="112" width="14" height="28" rx="2" fill="url(#barGrad)" filter="url(#barGlow)"/>
    <rect x="162" y="88"  width="14" height="52" rx="2" fill="url(#barGrad)" filter="url(#barGlow)"/>
    <rect x="184" y="64"  width="14" height="76" rx="2" fill="url(#barGrad)" filter="url(#barGlow)"/>
    <rect x="206" y="100" width="14" height="40" rx="2" fill="url(#barGrad)" filter="url(#barGlow)"/>

    <!-- Title -->
    <text x="450" y="120" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="60" fill="url(#titleGrad)" text-anchor="middle" font-weight="bold" filter="url(#glow)" letter-spacing="-1">AgentMeter</text>

    <!-- Subtitle -->
    <text x="450" y="152" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">Track Token Usage &amp; Costs for AI Agents</text>
  </g>
</svg>
